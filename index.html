<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Source Code Repository - GitHub Live Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .file-row:hover { background-color: #f6f8fa; }
        .file-row.selected { background-color: #0969da12; }
        
        thead th {
            position: sticky;
            top: 0;
            background: #ffffff;
            z-index: 10;
            box-shadow: inset 0 -1px 0 #d0d7de;
            font-weight: 600;
            color: #57606a;
            font-size: 12px;
        }
        
        .breadcrumb-item:hover { color: #0969da; text-decoration: underline; }
        
        #preview-panel {
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 1px solid #d0d7de;
        }

        .spinner {
            animation: rotate 2s linear infinite;
            width: 20px;
            height: 20px;
        }
        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-white">

    <!-- 頂部導覽列 -->
    <nav class="px-6 py-3 border-b border-gray-200 flex items-center justify-between text-sm select-none bg-slate-50">
        <div id="breadcrumb-container" class="flex items-center gap-2 text-slate-600 font-semibold">
            <i class="fa-brands fa-github text-lg"></i>
            <span id="repo-status">正在偵測儲存庫...</span>
        </div>
        <div class="flex gap-2">
            <input type="file" id="folder-input" webkitdirectory mozdirectory directory class="hidden">
            <button id="manual-load-btn" onclick="document.getElementById('folder-input').click()" class="border border-gray-300 bg-white hover:bg-gray-50 text-slate-700 px-3 py-1 rounded-md flex items-center gap-2 transition-all shadow-sm text-xs font-semibold">
                <i class="fa-solid fa-folder-plus text-blue-500"></i> 手動載入本地專案
            </button>
        </div>
    </nav>

    <!-- 主內容區 -->
    <div class="flex flex-1 overflow-hidden">
        <main class="flex-1 overflow-y-auto no-scrollbar relative" id="main-content">
            <div id="loading-overlay" class="hidden absolute inset-0 bg-white bg-opacity-80 z-20 flex flex-col items-center justify-center">
                <i class="fa-solid fa-circle-notch spinner text-blue-500 text-3xl mb-4"></i>
                <p class="text-slate-500 text-sm">正在從 GitHub 獲取檔案樹...</p>
            </div>

            <div id="empty-view" class="flex flex-col items-center justify-center h-full text-slate-400">
                <i class="fa-solid fa-code-merge text-6xl mb-4 opacity-20"></i>
                <p class="text-lg">未偵測到線上儲存庫</p>
                <p class="text-xs mt-2">請點擊上方按鈕載入本地專案，或部署至 GitHub Pages</p>
            </div>

            <table id="file-table" class="w-full text-left text-sm border-collapse hidden">
                <thead>
                    <tr class="select-none">
                        <th class="px-6 py-3 border-r border-gray-100 w-[45%]">名稱</th>
                        <th class="px-6 py-3 border-r border-gray-100 w-32">類型</th>
                        <th class="px-6 py-3 border-r border-gray-100 w-48">最後更新</th>
                        <th class="px-6 py-3 text-right w-24">大小</th>
                    </tr>
                </thead>
                <tbody id="file-list"></tbody>
            </table>
        </main>

        <!-- 預覽面板 -->
        <aside id="preview-panel" class="w-0 overflow-hidden bg-white flex flex-col shadow-2xl">
            <div class="p-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                <h3 class="font-bold text-slate-800 text-xs uppercase tracking-tight" id="preview-title">File Inspector</h3>
                <button onclick="closePreview()" class="text-slate-400 hover:text-red-500 transition-colors">
                    <i class="fa-solid fa-circle-xmark text-lg"></i>
                </button>
            </div>
            <div class="flex-1 p-6 overflow-y-auto">
                <div class="flex flex-col items-center py-6 border-b border-gray-100 mb-6">
                    <i id="preview-icon" class="fa-solid fa-file text-5xl mb-4"></i>
                    <p id="preview-filename" class="text-base font-bold text-slate-900 break-all text-center px-4"></p>
                </div>
                <div class="grid grid-cols-2 gap-y-3 gap-x-2 text-[11px] mb-8">
                    <div class="text-slate-400 font-medium">檔案格式</div>
                    <div id="preview-type" class="text-slate-700 font-bold text-right"></div>
                    <div class="text-slate-400 font-medium">檔案大小</div>
                    <div id="preview-size" class="text-slate-700 font-bold text-right"></div>
                    <div class="text-slate-400 font-medium">更新日期</div>
                    <div id="preview-date" class="text-slate-700 font-bold text-right"></div>
                </div>
                <div id="content-area">
                    <div class="flex items-center justify-between mb-2">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Code Preview</p>
                        <span id="preview-badge" class="px-2 py-0.5 bg-blue-100 text-blue-600 rounded text-[9px] font-bold">RAW</span>
                    </div>
                    <pre id="file-text-content" class="bg-gray-50 text-slate-700 p-4 rounded-md text-[11px] leading-relaxed overflow-x-auto whitespace-pre-wrap min-h-[300px] border border-gray-200 font-mono"></pre>
                </div>
            </div>
        </aside>
    </div>

    <script>
        let virtualFileSystem = null;
        let pathStack = []; 
        let currentSelectedNode = null;
        let isGitHubMode = false;

        const iconMap = {
            'js': 'fa-brands fa-square-js text-yellow-400',
            'jsx': 'fa-brands fa-react text-blue-400',
            'ts': 'fa-solid fa-file-code text-blue-500',
            'tsx': 'fa-brands fa-react text-cyan-400',
            'html': 'fa-brands fa-html5 text-orange-500',
            'css': 'fa-brands fa-css3-alt text-blue-400',
            'json': 'fa-solid fa-file-signature text-yellow-600',
            'md': 'fa-brands fa-markdown text-slate-500',
            'py': 'fa-brands fa-python text-blue-600',
            'java': 'fa-brands fa-java text-red-600',
            'cpp': 'fa-solid fa-c text-blue-700',
            'php': 'fa-brands fa-php text-indigo-400',
            'png': 'fa-solid fa-image text-purple-400',
            'jpg': 'fa-solid fa-image text-purple-400',
            'svg': 'fa-solid fa-file-code text-pink-400',
            'txt': 'fa-solid fa-file-lines text-slate-400'
        };

        const folderInput = document.getElementById('folder-input');
        const emptyView = document.getElementById('empty-view');
        const fileTable = document.getElementById('file-table');
        const fileList = document.getElementById('file-list');
        const breadcrumbContainer = document.getElementById('breadcrumb-container');
        const previewPanel = document.getElementById('preview-panel');
        const loadingOverlay = document.getElementById('loading-overlay');

        // 初始化偵測
        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            let repo = urlParams.get('repo');

            // 如果沒有參數，嘗試從 GitHub Pages URL 偵測 (username.github.io/repo)
            if (!repo && window.location.hostname.includes('github.io')) {
                const pathParts = window.location.pathname.split('/').filter(p => p);
                const username = window.location.hostname.split('.')[0];
                if (pathParts.length > 0) {
                    repo = `${username}/${pathParts[0]}`;
                }
            }

            if (repo) {
                isGitHubMode = true;
                document.getElementById('repo-status').textContent = `正在連接: ${repo}`;
                await loadGitHubRepo(repo);
            } else {
                document.getElementById('repo-status').textContent = `本地模式`;
            }
        };

        async function loadGitHubRepo(repo) {
            loadingOverlay.classList.remove('hidden');
            try {
                // 獲取預設分支的檔案樹 (遞迴模式)
                const res = await fetch(`https://api.github.com/repos/${repo}/git/trees/main?recursive=1`);
                if (!res.ok) throw new Error('無法獲取儲存庫');
                const data = await res.json();
                
                buildGitHubFileSystem(repo, data.tree);
                pathStack = [virtualFileSystem];
                emptyView.classList.add('hidden');
                fileTable.classList.remove('hidden');
                renderAll();
            } catch (err) {
                console.error(err);
                document.getElementById('repo-status').textContent = `載入失敗: ${err.message}`;
            } finally {
                loadingOverlay.classList.add('hidden');
            }
        }

        function buildGitHubFileSystem(repoName, tree) {
            virtualFileSystem = { name: repoName, kind: 'directory', children: {} };
            tree.forEach(item => {
                const pathParts = item.path.split('/');
                let current = virtualFileSystem;
                pathParts.forEach((part, i) => {
                    const isLast = i === pathParts.length - 1;
                    if (isLast) {
                        current.children[part] = {
                            name: part,
                            kind: item.type === 'blob' ? 'file' : 'directory',
                            size: item.size ? formatBytes(item.size) : '-',
                            date: 'Live from GitHub',
                            url: item.url, // GitHub API URL
                            children: item.type === 'tree' ? {} : null
                        };
                    } else {
                        if (!current.children[part]) current.children[part] = { name: part, kind: 'directory', children: {} };
                        current = current.children[part];
                    }
                });
            });
        }

        folderInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            isGitHubMode = false;
            buildLocalFileSystem(files);
            pathStack = [virtualFileSystem];
            emptyView.classList.add('hidden');
            fileTable.classList.remove('hidden');
            closePreview();
            renderAll();
        });

        function buildLocalFileSystem(files) {
            const rootName = files[0].webkitRelativePath.split('/')[0];
            virtualFileSystem = { name: rootName, kind: 'directory', children: {} };
            files.forEach(file => {
                const pathParts = file.webkitRelativePath.split('/');
                let current = virtualFileSystem;
                for (let i = 1; i < pathParts.length; i++) {
                    const part = pathParts[i];
                    if (i === pathParts.length - 1) {
                        current.children[part] = {
                            name: part, kind: 'file', size: formatBytes(file.size),
                            date: new Date(file.lastModified).toLocaleDateString(), fileObject: file
                        };
                    } else {
                        if (!current.children[part]) current.children[part] = { name: part, kind: 'directory', children: {} };
                        current = current.children[part];
                    }
                }
            });
        }

        function renderBreadcrumb() {
            breadcrumbContainer.innerHTML = `<i class="fa-brands fa-github text-lg mr-1"></i>`;
            pathStack.forEach((node, index) => {
                const item = document.createElement('span');
                item.className = "breadcrumb-item cursor-pointer transition-colors";
                item.textContent = node.name;
                item.onclick = () => { pathStack = pathStack.slice(0, index + 1); closePreview(); renderAll(); };
                breadcrumbContainer.appendChild(item);
                if (index < pathStack.length - 1) {
                    const sep = document.createElement('span');
                    sep.textContent = '/';
                    sep.className = "mx-1 text-gray-300 font-light";
                    breadcrumbContainer.appendChild(sep);
                }
            });
        }

        function renderFileList() {
            fileList.innerHTML = '';
            const currentNode = pathStack[pathStack.length - 1];
            const children = Object.values(currentNode.children || {});
            children.sort((a, b) => a.kind !== b.kind ? (a.kind === 'directory' ? -1 : 1) : a.name.localeCompare(b.name));

            if (pathStack.length > 1) {
                const backTr = document.createElement('tr');
                backTr.className = "file-row cursor-pointer border-b border-gray-100 group";
                backTr.innerHTML = `<td class="px-6 py-2 flex items-center gap-3" colspan="4"><i class="fa-solid fa-level-up-alt rotate-90 text-slate-400 group-hover:text-blue-600 transition-colors"></i><span class="text-slate-500 font-medium group-hover:text-blue-600 transition-colors">..</span></td>`;
                backTr.onclick = () => { pathStack.pop(); closePreview(); renderAll(); };
                fileList.appendChild(backTr);
            }

            children.forEach((node) => {
                const tr = document.createElement('tr');
                tr.className = `file-row cursor-pointer border-b border-gray-100 ${currentSelectedNode === node ? 'selected' : ''}`;
                const ext = node.name.split('.').pop().toLowerCase();
                const icon = node.kind === 'directory' ? 'fa-solid fa-folder text-blue-400' : (iconMap[ext] || 'fa-solid fa-file-lines text-slate-300');
                
                tr.innerHTML = `
                    <td class="px-6 py-2 flex items-center gap-3">
                        <i class="${icon} text-base w-5 text-center"></i>
                        <span class="truncate text-slate-700 font-medium">${node.name}</span>
                    </td>
                    <td class="px-6 py-2 text-slate-400 text-xs">${node.kind === 'directory' ? 'Folder' : ext.toUpperCase()}</td>
                    <td class="px-6 py-2 text-slate-400 text-xs">${node.date || '-'}</td>
                    <td class="px-6 py-2 text-slate-400 text-xs text-right font-mono">${node.size || '-'}</td>
                `;

                tr.onclick = (e) => {
                    e.stopPropagation();
                    currentSelectedNode = node;
                    document.querySelectorAll('.file-row').forEach(r => r.classList.remove('selected'));
                    tr.classList.add('selected');
                    if (node.kind === 'file') openPreview(node); else closePreview();
                };

                tr.ondblclick = () => { if (node.kind === 'directory') { pathStack.push(node); closePreview(); renderAll(); } };
                fileList.appendChild(tr);
            });
        }

        async function openPreview(node) {
            previewPanel.style.width = '450px';
            document.getElementById('preview-filename').textContent = node.name;
            document.getElementById('preview-size').textContent = node.size;
            document.getElementById('preview-date').textContent = node.date;
            const ext = node.name.split('.').pop().toLowerCase();
            document.getElementById('preview-icon').className = `${iconMap[ext] || 'fa-solid fa-file'} text-5xl mb-4`;
            document.getElementById('preview-type').textContent = ext.toUpperCase();

            const textContent = document.getElementById('file-text-content');
            textContent.textContent = '載入內容中...';

            try {
                if (isGitHubMode && node.url) {
                    // 從 GitHub API 獲取 Base64 內容
                    const res = await fetch(node.url);
                    const data = await res.json();
                    const decoded = atob(data.content.replace(/\s/g, ''));
                    textContent.textContent = decoded;
                } else if (node.fileObject) {
                    const text = await node.fileObject.slice(0, 5000).text();
                    textContent.textContent = text || '// 空檔案';
                }
            } catch (e) {
                textContent.textContent = '// 無法讀取內容 (可能為二進位檔案)';
            }
        }

        function formatBytes(bytes) {
            if (!bytes || bytes === 0) return '0 B';
            const k = 1024, sizes = ['B', 'KB', 'MB', 'GB'], i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function closePreview() { previewPanel.style.width = '0'; currentSelectedNode = null; }
        function renderAll() { renderBreadcrumb(); renderFileList(); }
        document.addEventListener('mousedown', (e) => { if (!e.target.closest('.file-row') && !e.target.closest('#preview-panel') && !e.target.closest('nav')) closePreview(); });
    </script>
</body>
</html>
