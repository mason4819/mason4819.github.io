<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web ADB - Debug Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --color-canvas-default: #0d1117;
            --color-border-default: #30363d;
            --color-accent-fg: #58a6ff;
        }
        body { background-color: var(--color-canvas-default); color: #c9d1d9; font-family: -apple-system, system-ui, sans-serif; }
        .github-card { background-color: #161b22; border: 1px solid var(--color-border-default); border-radius: 6px; }
        .console-box { background-color: #010409; border: 1px solid #30363d; font-family: ui-monospace, SFMono-Regular, monospace; }
    </style>
</head>
<body class="p-4 sm:p-8">
    <div class="max-w-3xl mx-auto">
        <header class="mb-8 border-b border-gray-700 pb-4">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <i class="fa-brands fa-github text-3xl"></i>
                WebADB 診斷工具
            </h1>
            <p id="env-check" class="text-sm mt-2"></p>
        </header>

        <div class="grid gap-6">
            <!-- 連線區塊 -->
            <div class="github-card p-6">
                <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-terminal text-blue-400 text-sm"></i> 
                    第一步：建立通訊
                </h2>
                
                <div class="flex flex-col sm:flex-row gap-4 mb-4">
                    <button id="btn-request" class="bg-[#238636] hover:bg-[#2ea043] text-white px-6 py-2 rounded-md font-medium transition-all">
                        選取並連接裝置
                    </button>
                    <button id="btn-clear" class="border border-[#30363d] hover:bg-[#21262d] px-4 py-2 rounded-md text-sm">
                        清空日誌
                    </button>
                </div>

                <div id="status-panel" class="text-sm space-y-2 text-gray-400">
                    <div class="flex items-center gap-2">
                        <span id="indicator" class="w-2 h-2 rounded-full bg-gray-600"></span>
                        狀態: <span id="status-text">未偵測到動作</span>
                    </div>
                </div>
            </div>

            <!-- 日誌輸出區塊 -->
            <div class="github-card p-4">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-semibold text-gray-500 uppercase">輸出日誌 (Console Output)</span>
                </div>
                <div id="console" class="console-box h-80 overflow-y-auto p-4 text-xs leading-relaxed space-y-1">
                    <div class="text-gray-500">// 系統日誌將顯示於此...</div>
                </div>
            </div>

            <!-- 常見問題引導 -->
            <div class="text-xs text-gray-500 space-y-1 opacity-70">
                <p class="font-bold">連線沒反應？</p>
                <ul class="list-disc pl-4 space-y-1">
                    <li>檢查是否為 HTTPS 環境 (或 localhost)。</li>
                    <li>檢查手機是否已開啟「USB 偵錯」。</li>
                    <li>更換傳輸線（有些線只能充電不能傳輸）。</li>
                    <li>關閉電腦端正在運行的 ADB 軟體。</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- 核心邏輯 -->
    <script type="module">
        import { Adb, AdbWebUsbBackend, AdbAuthenticators } from 'https://esm.sh/@yume-chan/adb@0.0.23';

        const btnRequest = document.getElementById('btn-request');
        const btnClear = document.getElementById('btn-clear');
        const consoleEl = document.getElementById('console');
        const statusText = document.getElementById('status-text');
        const indicator = document.getElementById('indicator');
        const envCheck = document.getElementById('env-check');

        // 1. 環境檢測
        if (window.isSecureContext) {
            envCheck.innerHTML = '<span class="text-green-500 font-medium">✓ 安全環境 (HTTPS/Localhost) 已就緒</span>';
        } else {
            envCheck.innerHTML = '<span class="text-red-500 font-medium">✗ 錯誤：非 HTTPS 環境，WebUSB 無法運行</span>';
            btnRequest.disabled = true;
            btnRequest.classList.add('opacity-50', 'cursor-not-allowed');
        }

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            const colors = {
                info: 'text-gray-400',
                success: 'text-green-400',
                error: 'text-red-400',
                warn: 'text-yellow-400'
            };
            div.className = colors[type] || 'text-gray-300';
            div.innerHTML = `<span class="opacity-50 text-[10px] mr-2">${new Date().toLocaleTimeString()}</span> ${msg}`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        btnClear.onclick = () => consoleEl.innerHTML = '';

        btnRequest.onclick = async () => {
            try {
                log("正在請求 USB 裝置選取權限...");
                const backend = await AdbWebUsbBackend.requestDevice();
                
                if (!backend) {
                    log("使用者取消了裝置選取", "warn");
                    return;
                }

                log(`已選取裝置: ${backend.serial || 'USB 裝置'}`, "info");
                log("正在連線並進行金鑰握手... 請檢查手機螢幕是否有授權彈窗！", "warn");
                
                statusText.textContent = "認證中...";
                indicator.className = "w-2 h-2 rounded-full bg-yellow-500 animate-pulse";

                // 2. 進行 ADB 認證
                // 注意：這一步會觸發手機上的彈窗
                const adb = await Adb.authenticate(backend, AdbAuthenticators.DEFAULT);

                log("連線成功！", "success");
                statusText.textContent = "已成功連線";
                indicator.className = "w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]";
                
                // 3. 測試獲取資訊
                const model = await adb.getProp("ro.product.model");
                log(`設備型號識別: ${model}`, "success");
                log("現在你可以擴展更多功能了。");

            } catch (err) {
                console.error(err);
                log(`連線過程中斷: ${err.message}`, "error");
                statusText.textContent = "連線失敗";
                indicator.className = "w-2 h-2 rounded-full bg-red-500";
                
                if (err.message.includes("Claims")) {
                    log("提示：USB 介面已被另一個程式佔用 (可能是電腦的 adb server)。請執行 adb kill-server 後再試。", "warn");
                }
            }
        };
    </script>
</body>
</html>
